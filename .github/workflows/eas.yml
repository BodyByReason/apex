name: APEX CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options: [android, ios, all]
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options: [development, preview, production]

# ─── SHARED ENV ───────────────────────────────────────────────
env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

# ─── JOBS ─────────────────────────────────────────────────────
jobs:

  # 1. TYPE CHECK — runs on every push/PR
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # 2. DEPLOY SUPABASE EDGE FUNCTIONS — on push to main/develop
  deploy-edge-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy anthropic proxy
        run: |
          supabase functions deploy anthropic \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # 3. ANDROID PREVIEW BUILD — on push to develop
  build-android-preview:
    name: Android Preview Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build Android preview APK
        run: eas build --platform android --profile preview --non-interactive --no-wait

  # 4. ANDROID PRODUCTION BUILD + OTA — on push to main
  build-android-production:
    name: Android Production Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [typecheck, deploy-edge-functions]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Publish OTA update to production channel
        run: eas update --channel production --message "Release from ${{ github.sha }}" --non-interactive
      - name: Build Android AAB (production)
        run: eas build --platform android --profile production --non-interactive --no-wait

  # 5. iOS PRODUCTION BUILD — on push to main (activates once Apple account is live)
  build-ios-production:
    name: iOS Production Build
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.IOS_BUILDS_ENABLED == 'true'
    needs: [typecheck, deploy-edge-functions]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Publish OTA update to production channel
        run: eas update --channel production --message "iOS release from ${{ github.sha }}" --non-interactive
      - name: Build iOS IPA (production)
        run: eas build --platform ios --profile production --non-interactive --no-wait

  # 6. MANUAL DISPATCH — build any platform + profile on demand
  build-manual:
    name: Manual Build (${{ github.event.inputs.platform }} / ${{ github.event.inputs.profile }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Trigger EAS build
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive \
            --no-wait
